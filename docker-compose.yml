version: "3.9"

services:
  ribbon-upgrade:
    build: .
    container_name: ribbon-upgrade-automation
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ribbon-data:/data
      - ribbon-uploads:/uploads
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  ribbon-data:
    driver: local
  ribbon-uploads:
    driver: local
