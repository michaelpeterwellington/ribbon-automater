{% extends "base.html" %}
{% block title %}Firmware Library{% endblock %}
{% block content %}
<div class="page-header d-flex justify-content-between align-items-center">
  <h1><i class="bi bi-archive me-2 text-primary"></i>Firmware Library</h1>
</div>

<!-- Upload card -->
<div class="card mb-4">
  <div class="card-header"><i class="bi bi-upload me-1"></i> Upload Firmware</div>
  <div class="card-body">
    <div id="drop-zone" class="border border-2 border-dashed rounded p-4 text-center text-muted mb-3"
         style="border-color:#3d4147!important; cursor:pointer"
         ondragover="event.preventDefault()" ondrop="handleDrop(event)">
      <i class="bi bi-cloud-upload fs-2"></i>
      <div class="mt-1">Drag &amp; drop a <code>.img</code> / <code>.bin</code> file here, or click to browse</div>
      <input type="file" id="fw-file" class="d-none" accept=".img,.bin,.tar,.gz,.iso">
    </div>
    <div class="row g-3">
      <div class="col-md-4">
        <label class="form-label">Version string *</label>
        <input class="form-control" id="fw-version" placeholder="e.g. 13.0.0">
      </div>
      <div class="col-md-4">
        <label class="form-label">Compatible device types</label>
        <div class="d-flex gap-3 mt-1">
          <div class="form-check"><input class="form-check-input" type="checkbox" value="SWE_EDGE" id="compat-swe" checked>
            <label class="form-check-label" for="compat-swe">SWe Edge</label></div>
          <div class="form-check"><input class="form-check-input" type="checkbox" value="SBC1K" id="compat-1k">
            <label class="form-check-label" for="compat-1k">SBC 1000</label></div>
          <div class="form-check"><input class="form-check-input" type="checkbox" value="SBC2K" id="compat-2k">
            <label class="form-check-label" for="compat-2k">SBC 2000</label></div>
        </div>
      </div>
      <div class="col-md-4">
        <label class="form-label">Notes</label>
        <input class="form-control" id="fw-notes">
      </div>
    </div>
    <div class="mt-3">
      <div id="upload-progress" class="d-none mb-2">
        <div class="progress"><div class="progress-bar progress-bar-striped progress-bar-animated" style="width:100%"></div></div>
        <small class="text-muted" id="upload-status">Uploading…</small>
      </div>
      <button class="btn btn-primary" id="upload-btn" disabled>
        <i class="bi bi-upload me-1"></i>Upload
      </button>
    </div>
  </div>
</div>

<!-- Firmware list -->
<div class="card">
  <div class="card-body p-0">
    <table class="table table-hover mb-0" id="fw-table">
      <thead><tr>
        <th>Filename</th><th>Version</th><th>Compatible</th>
        <th>Size</th><th>SHA256</th><th>Uploaded</th><th></th>
      </tr></thead>
      <tbody><tr><td colspan="7" class="text-center text-muted py-4">Loading…</td></tr></tbody>
    </table>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('fw-file');
const uploadBtn = document.getElementById('upload-btn');

dropZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', () => updateDropZone(fileInput.files[0]));

function handleDrop(e) {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if (file) { fileInput.files = e.dataTransfer.files; updateDropZone(file); }
}

function updateDropZone(file) {
  if (!file) return;
  dropZone.innerHTML = `<i class="bi bi-file-earmark-binary fs-2 text-success"></i><div class="mt-1">${file.name} (${(file.size/1024/1024).toFixed(1)} MB)</div>`;
  uploadBtn.disabled = false;
}

uploadBtn.addEventListener('click', async () => {
  const file = fileInput.files[0];
  if (!file) return alert('Select a file first');
  const version = document.getElementById('fw-version').value.trim();
  if (!version) return alert('Version is required');

  const types = ['compat-swe','compat-1k','compat-2k']
    .filter(id => document.getElementById(id).checked)
    .map(id => document.getElementById(id).value);

  const fd = new FormData();
  fd.append('file', file);
  fd.append('version', version);
  fd.append('compatible_types', JSON.stringify(types));
  fd.append('notes', document.getElementById('fw-notes').value || '');

  document.getElementById('upload-progress').classList.remove('d-none');
  document.getElementById('upload-status').textContent = 'Uploading…';
  uploadBtn.disabled = true;

  try {
    await api('POST', '/api/firmware', fd);
    document.getElementById('upload-status').textContent = 'Upload complete!';
    loadFirmware();
    setTimeout(() => document.getElementById('upload-progress').classList.add('d-none'), 3000);
  } catch(e) {
    document.getElementById('upload-status').textContent = 'Error: ' + e.message;
  }
  uploadBtn.disabled = false;
});

async function loadFirmware() {
  const list = await api('GET', '/api/firmware');
  const tbody = document.querySelector('#fw-table tbody');
  if (!list.length) {
    tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted py-4">No firmware uploaded yet</td></tr>';
    return;
  }
  tbody.innerHTML = list.map(f => `
    <tr>
      <td class="fw-semibold"><i class="bi bi-file-earmark-binary me-1 text-muted"></i>${f.filename}</td>
      <td><code>${f.version}</code></td>
      <td>${(f.compatible_types||[]).map(t => `<span class="badge bg-secondary me-1">${t}</span>`).join('')||'<span class="text-muted">—</span>'}</td>
      <td>${(f.file_size/1024/1024).toFixed(1)} MB</td>
      <td><small class="text-muted font-monospace">${f.sha256.substring(0,12)}…</small></td>
      <td><small>${new Date(f.uploaded_at).toLocaleString()}</small></td>
      <td class="text-end">
        <button class="btn btn-sm btn-outline-danger" onclick="deleteFirmware(${f.id},'${f.filename}')">
          <i class="bi bi-trash"></i>
        </button>
      </td>
    </tr>`).join('');
}

async function deleteFirmware(id, name) {
  if (!confirm(`Delete ${name}?`)) return;
  try {
    await api('DELETE', `/api/firmware/${id}`);
    loadFirmware();
  } catch(e) {
    alert(e.message);
  }
}

loadFirmware();
</script>
{% endblock %}
